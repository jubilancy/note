# Site Specific Configuration
name: Note
description: A personal note repository
url: https://jubilancy.github.io/note/
baseurl: "/note"
author: jubilancy
timezone: America/Toronto
timezone_short: ET

# Keywords
keywords: ['notes', 'blog', 'jekyll']

# Analytics (Plausible requires sign-up)
analytics:
  plausible:
    enabled: false
    site_fqdn: 'your.site.fqdn'
    script_source: 'https://plausible.io/js/script.js'

# Styling
sass:
  sass_dir: _sass
  style: expanded # compact, expanded or compressed

# Paginate
pagination:
  enabled: true
  per_page: 10
  sort_field: 'date'
  sort_reverse: true

# Category Paginating
autopages:
  enabled: true
  categories:
    title: 'Posts in category :cat'
    permalink: '/category/:cat'
    silent: false

# Exclusions
exclude: ['README.md', 'COPYING', '.gitignore', 'Gemfile', 'Gemfile.lock']

# Plugins
plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-seo-tag
